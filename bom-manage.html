<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOM 管理 - AIBOM Platform</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .split-layout { display:grid; grid-template-columns:280px 1fr; gap:0; height:calc(100vh - 120px); min-height:600px; }
    .tree-panel { background:var(--bg-surface); border:1px solid var(--border-color); border-radius:var(--radius-lg); overflow:hidden; display:flex; flex-direction:column; }
    .tree-panel-header { padding:12px 16px; border-bottom:1px solid var(--border-color); background:var(--gray-50); display:flex; align-items:center; gap:8px; flex-shrink:0; justify-content:space-between; }
    .tree-search { flex:1; display:flex; align-items:center; gap:6px; background:var(--bg-surface); border:1px solid var(--border-color); border-radius:var(--radius-sm); padding:0 8px; }
    .tree-search input { border:none; background:transparent; outline:none; font-size:12px; padding:5px 0; width:100%; color:var(--text-primary); }
    .tree-search i { color:var(--gray-400); font-size:13px; flex-shrink:0; }
    .tree-body { flex:1; overflow-y:auto; padding:8px; }
    .tree-node { display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:var(--radius-sm); cursor:pointer; font-size:12px; color:var(--text-secondary); transition:var(--t-fast); user-select:none; }
    .tree-node:hover { background:var(--gray-50); color:var(--text-primary); }
    .tree-node.active { background:var(--primary-50); color:var(--primary); font-weight:600; }
    .tree-node .tree-toggle { width:14px; height:14px; display:flex; align-items:center; justify-content:center; color:var(--gray-400); font-size:12px; flex-shrink:0; transition:transform .2s; }
    .tree-node .tree-toggle.open { transform:rotate(90deg); }
    .tree-node .tree-icon { font-size:13px; flex-shrink:0; }
    .tree-icon.sys { color:var(--primary); }
    .tree-icon.app { color:var(--success); }
    .tree-icon.container { color:var(--purple); }
    .tree-icon.model { color:var(--warning); }
    .tree-icon.comp { color:var(--gray-400); }
    .tree-label { flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tree-badge { font-size:10px; font-weight:700; padding:0 5px; border-radius:100px; background:var(--danger); color:#fff; flex-shrink:0; }
    .tree-children { display:none; padding-left:16px; }
    .tree-children.open { display:block; }
    .ai-tag { display:inline-flex; align-items:center; padding:0 4px; font-size:9px; font-weight:700; background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; border-radius:2px; margin-left:4px; letter-spacing:.5px; }

    .view-panel { padding-left:16px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; }
    .system-summary-card { background:var(--bg-surface); border:1px solid var(--border-color); border-radius:var(--radius-lg); padding:10px 14px; box-shadow:var(--shadow-card); }
    .ss-header { display:flex; align-items:center; gap:14px; margin-bottom:0; }
    .ss-icon { width:44px; height:44px; border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; font-size:22px; }
    .ss-icon.sys { background:var(--primary-50); color:var(--primary); }
    .ss-icon.app { background:var(--cyan-light); color:var(--cyan); }
    .ss-icon.container { background:var(--purple-light); color:var(--purple); }
    .ss-icon.comp { background:var(--gray-100); color:var(--gray-600); }
    .ss-head { display:flex; flex-direction:column; gap:2px; }
    .ss-title-row { display:flex; align-items:center; gap:8px; }
    .ss-metrics { display:flex; align-items:center; gap:8px; margin-top:2px; font-size:12px; color:var(--text-secondary); }
    .ss-metric { display:inline-flex; align-items:center; gap:6px; }
    .ss-metric-label { color:var(--text-tertiary); }
    .ss-metric-val { font-weight:700; color:var(--text-primary); }
    .ss-metric-val.primary { color:var(--primary); }
    .ss-metric-val.danger { color:var(--danger); }
    .ss-metric-sep { color:var(--border-color); }
    .ss-divider { height:1px; background:var(--gray-100); margin:12px 0; }
    .ss-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px 16px; }
    .ss-extra-toggle-row { display:flex; justify-content:center; padding-top:6px; }
    .ss-extra-toggle-btn { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--text-secondary); border:none; background:transparent; cursor:pointer; padding:6px 8px; border-radius:10px; transition:var(--t-fast); min-width:32px; justify-content:center; }
    .ss-extra-toggle-btn:hover { background:var(--gray-50); color:var(--text-primary); }
    .ss-extra-toggle-btn i { font-size:16px; transition:transform .2s; }
    .ss-extra-grid { margin-top:8px; border-top:1px dashed var(--border-color); padding-top:8px; }
    .sf.sf-wide { grid-column:1 / -1; }
    .sf.sf-wide .sf-val.truncate { max-width:100%; }
    .sf { display:flex; align-items:center; gap:8px; font-size:12px; }
    .sf-label { color:var(--gray-400); min-width:64px; flex-shrink:0; }
    .sf-val { color:var(--text-primary); font-weight:500; }
    .sf-val.truncate { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:240px; display:block; }
    
    .data-table th:last-child, .data-table td:last-child { text-align: left; }

    .dropdown { position:relative; }
    .dropdown-menu { display:none; position:absolute; top:calc(100% + 4px); left:0; z-index:50; background:var(--bg-surface); border:1px solid var(--border-color); border-radius:var(--radius-md); box-shadow:var(--shadow-md); min-width:180px; overflow:hidden; }
    .dropdown-menu.show { display:block; }
    .dropdown-item { display:flex; align-items:center; gap:8px; padding:8px 14px; font-size:13px; color:var(--text-primary); cursor:pointer; transition:background .15s; }
    .dropdown-item:hover { background:var(--primary-50); color:var(--primary); }
    .dropdown-item i { font-size:14px; color:var(--gray-400); }
    
    .license-popover { position:fixed; z-index:201; width:min(240px, calc((100vw - 32px) / 3)); background:var(--bg-surface); border:1px solid var(--border-color); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); display:none; overflow:hidden; }
    .license-popover.show { display:block; }
    .license-popover-header { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-bottom:1px solid var(--border-color); }
    .license-popover-title { font-size:12px; font-weight:700; color:var(--text-primary); display:flex; align-items:center; gap:6px; }
    .license-popover-count { color:var(--text-tertiary); font-weight:600; font-family:var(--font-mono); }
    .license-popover-close { width:24px; height:24px; border-radius:8px; border:1px solid var(--border-color); background:transparent; color:var(--text-secondary); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:var(--t-fast); }
    .license-popover-close:hover { background:var(--gray-50); color:var(--text-primary); }
    .license-popover-body { padding:10px 12px; max-height:none; overflow:visible; font-size:14px; }
    .license-popover-body::-webkit-scrollbar { width:8px; }
    .license-popover-body::-webkit-scrollbar-track { background:transparent; }
    .license-popover-body::-webkit-scrollbar-thumb { background:rgba(134,144,156,.35); border-radius:8px; border:2px solid transparent; background-clip:content-box; }
    .license-popover-body::-webkit-scrollbar-thumb:hover { background:rgba(134,144,156,.55); border:2px solid transparent; background-clip:content-box; }
    .license-list { display:flex; flex-direction:column; gap:8px; }
    .license-item { padding:6px 12px; background:var(--gray-50); border:1px solid var(--border-color); border-radius:var(--radius-md); display:flex; align-items:center; }
    .license-item-name { font-weight:400; color:var(--text-primary); }

    /* Side panel for vuln detail */
    .sp-section { margin-bottom:20px; }
    .sp-section-title { font-size:12px; font-weight:600; color:var(--text-primary); margin-bottom:10px; display:flex; align-items:center; gap:6px; padding-bottom:0; border-bottom:none; }
    .info-section-title { padding-bottom:0 !important; border-bottom:none !important; }
    .sp-section-title i { font-size:13px; color:var(--primary); }
    .sp-title-group { display:flex; align-items:center; gap:10px; }
    .sp-cve { font-size:15px; font-weight:700; font-family:var(--font-mono); color:var(--text-primary); }
    .sp-table { width:100%; border-collapse:collapse; font-size:12px; }
    .sp-table thead { background:var(--gray-50); }
    .sp-table th { padding:7px 10px; text-align:left; font-weight:600; color:var(--text-secondary); font-size:11px; border-bottom:1px solid var(--border-color); }
    .sp-table td { padding:8px 10px; border-bottom:1px solid var(--gray-100); color:var(--text-primary); vertical-align:middle; }
    .sp-table tbody tr:hover { background:var(--primary-50); }
    .repo-kv-table th { width: 96px; }
    .repo-kv-table td { font-size: 12px; }
    .repo-kv-table td a { color: var(--primary); word-break: break-all; text-decoration: none; }
    .repo-kv-table td a:hover { text-decoration: underline; }

    /* Charts */
    .chart-js-area { width: 100% !important; height: 220px !important; }
    canvas.chart-js-area { display: block; }
    
    /* Trend legend */
    .trend-legend { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .trend-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--gray-500); }
    .trend-legend-dot { width: 10px; height: 3px; border-radius: 2px; flex-shrink: 0; }
    
    .view-panel > .system-summary-card, .view-panel > .card { margin: 0; }

    /* Distribution chart row */
    .dist-row { display: flex; gap: 16px; }
    .dist-donut { flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .dist-legend { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 8px; }
    .dist-legend-item { display: flex; align-items: center; gap: 8px; }
    .dist-legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
    .dist-legend-label { font-size: 12px; color: var(--text-secondary); flex: 1; }
    .dist-legend-count { font-size: 13px; font-weight: 700; font-family: var(--font-mono); color: var(--text-primary); min-width: 40px; text-align: right; }
    .dist-legend-pct { font-size: 11px; color: var(--gray-400); font-family: var(--font-mono); min-width: 44px; text-align: right; }
    .dist-bar-wrap { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
    .dist-bar { flex: 1; height: 3px; background: var(--gray-100); border-radius: 2px; overflow: hidden; }
    .dist-bar-fill { height: 100%; border-radius: 2px; }

    /* ── Dark mode: bom-manage specific ── */
    html.dark .tree-panel { background: var(--bg-surface); border-color: var(--border-color); }
    html.dark .tree-panel-header { border-color: var(--border-color); background: var(--dm-gray-50); }
    html.dark .tree-search { background: var(--dm-bg-input); border-color: var(--border-color); }
    html.dark .tree-search input { color: var(--text-primary); }
    html.dark .tree-node:hover { background: var(--bg-hover); color: var(--text-primary); }
    html.dark .tree-node.active { background: var(--dm-primary-50); color: var(--dm-primary); }
    html.dark .tree-children { border-color: var(--border-color); }
    html.dark .system-summary-card { background: var(--bg-surface); border-color: var(--border-color); }
    html.dark .ss-icon.sys { background: var(--dm-primary-50) !important; color: var(--dm-primary) !important; }
    html.dark .ss-icon.app { background: rgba(15,198,194,.15) !important; color: #22d3ee !important; }
    html.dark .ss-icon.container { background: rgba(114,46,209,.15) !important; color: #c084fc !important; }
    html.dark .ss-icon.comp { background: var(--dm-gray-100) !important; color: var(--dm-text-secondary) !important; }
    html.dark .dropdown-menu { background: var(--bg-surface); border-color: var(--border-color); }
    html.dark .dropdown-item:hover { background: var(--dm-primary-50); color: var(--dm-primary); }
    html.dark .license-popover { background: var(--bg-surface); border-color: var(--border-color); }
    html.dark .license-popover-close:hover { background: var(--dm-gray-50); }
    html.dark .license-item { background: var(--dm-gray-50); border-color: var(--border-color); }
    html.dark .sp-table thead { background: var(--dm-gray-50); }
    html.dark .sp-table th { border-color: var(--border-color); color: var(--dm-text-secondary); }
    html.dark .sp-table td { border-color: var(--border-color); }
    html.dark .sp-table tbody tr:hover { background: var(--dm-primary-50); }
    html.dark .sp-section-title { border-bottom:none; }
    html.dark .dist-bar { background: var(--dm-gray-200); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="header" id="header"></header>
    <div class="page-content page-enter" style="height:calc(100vh - 56px);overflow:hidden;display:flex;flex-direction:column;">

      <div class="page-header mb-16" style="flex-shrink:0;">
        <div>
          <div class="page-title">BOM 管理</div>
          <div class="page-desc">管理全平台软件物料清单，支持多维度视图切换与全局统计分析。</div>
        </div>
        <div class="flex items-center gap-8">
           <a href="bom-graph.html" class="btn btn-secondary"><i class="ri-node-tree"></i> 资产图谱</a>
           <div class="dropdown">
            <button class="btn btn-primary" onclick="toggleDropdown('exportDd')"><i class="ri-download-2-line"></i> 导出 BOM <i class="ri-arrow-down-s-line"></i></button>
            <div class="dropdown-menu" id="exportDd">
              <div class="dropdown-item" onclick="exportBOM('cyclonedx-json')"><i class="ri-file-code-line"></i> CycloneDX JSON</div>
              <div class="dropdown-item" onclick="exportBOM('excel')"><i class="ri-file-excel-line"></i> Excel 组件清单</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="stat-grid mb-16" style="flex-shrink:0;">
        <div class="stat-card">
          <div class="stat-card-top">
            <div><div class="stat-label">资产总数</div><div class="stat-value">1,284</div></div>
            <div class="stat-icon blue"><i class="ri-server-line"></i></div>
          </div>
          <div class="stat-footer"><span class="stat-footer-label">较上周</span><span class="stat-footer-val blue">+12.5%</span></div>
          <div class="stat-card-bar blue"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-top">
            <div><div class="stat-label">风险资产数</div><div class="stat-value">237</div></div>
            <div class="stat-icon red"><i class="ri-alert-line"></i></div>
          </div>
          <div class="stat-footer">
            <span class="stat-footer-label">系统/应用/容器/模型</span>
            <span class="stat-footer-val" style="display:flex;gap:4px;">
              <span style="color:var(--danger)">18</span>/
              <span style="color:var(--danger)">86</span>/
              <span style="color:var(--danger)">72</span>/
              <span style="color:var(--danger)">61</span>
            </span>
          </div>
          <div class="stat-card-bar red"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-top">
            <div><div class="stat-label">组件总数</div><div class="stat-value">15,832</div></div>
            <div class="stat-icon purple"><i class="ri-code-box-line"></i></div>
          </div>
          <div class="stat-footer"><span class="stat-footer-label">较上周</span><span class="stat-footer-val" style="color:var(--purple);">+8.3%</span></div>
          <div class="stat-card-bar" style="background:var(--purple);"></div>
        </div>
        <div class="stat-card">
          <div class="stat-card-top">
            <div><div class="stat-label">漏洞总数</div><div class="stat-value">3,847</div></div>
            <div class="stat-icon red"><i class="ri-bug-line"></i></div>
          </div>
          <div class="stat-footer">
            <span class="stat-footer-label">严重/高危/中危/低危</span>
            <span class="stat-footer-val" style="display:flex;gap:4px;">
              <span style="color:var(--purple)">401</span>/
              <span style="color:var(--danger)">846</span>/
              <span style="color:var(--warning)">1350</span>/
              <span style="color:var(--success)">1250</span>
            </span>
          </div>
          <div class="stat-card-bar red"></div>
        </div>
      </div>

      <!-- Charts Row -->
      <div class="grid-2 mb-16" style="flex-shrink:0;">
        <!-- Asset Composition Chart -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">
              <div class="card-title-bar blue"></div>
              资产构成
            </div>
          </div>
          <div class="card-body" style="padding-top:16px;">
            <div class="dist-row">
              <div class="dist-donut">
                <canvas id="assetDistChart" width="140" height="140"></canvas>
              </div>
              <div class="dist-legend">
                <div class="dist-legend-item">
                  <div class="dist-legend-dot" style="background:var(--primary);"></div>
                  <span class="dist-legend-label">系统</span>
                  <span class="dist-legend-count">385</span>
                  <span class="dist-legend-pct">30%</span>
                </div>
                <div class="dist-bar-wrap"><div class="dist-bar"><div class="dist-bar-fill" style="width:30%;background:var(--primary);"></div></div></div>
                
                <div class="dist-legend-item">
                  <div class="dist-legend-dot" style="background:var(--success);"></div>
                  <span class="dist-legend-label">应用</span>
                  <span class="dist-legend-count">321</span>
                  <span class="dist-legend-pct">25%</span>
                </div>
                <div class="dist-bar-wrap"><div class="dist-bar"><div class="dist-bar-fill" style="width:25%;background:var(--success);"></div></div></div>

                <div class="dist-legend-item">
                  <div class="dist-legend-dot" style="background:var(--purple);"></div>
                  <span class="dist-legend-label">容器</span>
                  <span class="dist-legend-count">257</span>
                  <span class="dist-legend-pct">20%</span>
                </div>
                <div class="dist-bar-wrap"><div class="dist-bar"><div class="dist-bar-fill" style="width:20%;background:var(--purple);"></div></div></div>

                <div class="dist-legend-item">
                  <div class="dist-legend-dot" style="background:var(--warning);"></div>
                  <span class="dist-legend-label">模型</span>
                  <span class="dist-legend-count">321</span>
                  <span class="dist-legend-pct">25%</span>
                </div>
                <div class="dist-bar-wrap"><div class="dist-bar"><div class="dist-bar-fill" style="width:25%;background:var(--warning);"></div></div></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Vulnerability Trend Chart -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">
              <div class="card-title-bar red"></div>
              近一周新增漏洞趋势
            </div>
            <div class="trend-legend">
              <div class="trend-legend-item"><div class="trend-legend-dot" style="background:#722ED1;"></div>严重</div>
              <div class="trend-legend-item"><div class="trend-legend-dot" style="background:#F53F3F;"></div>高危</div>
              <div class="trend-legend-item"><div class="trend-legend-dot" style="background:#FF7D00;"></div>中危</div>
              <div class="trend-legend-item"><div class="trend-legend-dot" style="background:#00B42A;"></div>低危</div>
            </div>
          </div>
          <div class="card-body" style="padding-top:12px;">
            <canvas id="vulnTrendChart" class="chart-js-area"></canvas>
          </div>
        </div>
      </div>


      <!-- Split Layout -->
      <div class="split-layout" style="flex:1;overflow:hidden;">
        <!-- Tree Panel -->
        <div class="tree-panel">
          <div class="tree-panel-header">
            <div class="tree-search">
              <i class="ri-search-line"></i>
              <input type="text" id="treeSearchInput" placeholder="搜索资产/IP..." oninput="searchTree(this.value)">
            </div>
            <button class="btn btn-secondary btn-sm" onclick="resetTree()"><i class="ri-refresh-line"></i> 重置</button>
          </div>
          <!-- 新增：资产树容器 -->
          <div class="tree-body" id="assetTree"></div>
        </div>

        <!-- View Panel -->
        <!-- 新增：视图容器 -->
        <div class="view-panel" id="viewPanel"></div>
      </div>

    </div>
  </div>
</div>

<!-- Side Panel -->
<div class="side-panel-overlay" id="spOverlay" onclick="closePanel()"></div>
<div class="side-panel" id="sidePanel">
  <div class="side-panel-header">
    <div style="font-size:14px;font-weight:700;color:var(--text-primary);" id="spTitle">组件漏洞详情</div>
    <button class="side-panel-close" onclick="closePanel()"><i class="ri-close-line"></i></button>
  </div>
  <div class="side-panel-body" id="spBody"></div>
</div>

<!-- License Popover -->
<div class="license-popover" id="licensePopover">
  <div class="license-popover-header">
    <div class="license-popover-title">许可证列表 <span class="license-popover-count" id="licensePopoverCount">(0)</span></div>
    <button class="license-popover-close" onclick="closeLicensePopover()"><i class="ri-close-line"></i></button>
  </div>
  <div class="license-popover-body" id="licensePopoverBody"></div>
</div>

<script src="common.js"></script>
<script>
  initPage('bom', [{label:'BOM 管理'}]);

  // 新增：资产树导航与联动逻辑
  
  // 1. 模拟资产数据
  const assetTreeData = [
    {
      id: 'sys-1', name: 'web-prod-gateway', type: 'sys', ip: '192.168.1.10',
      info: { 
        hostname: 'web-prod-gateway', 
        ip: '192.168.1.10', 
        ips: ['192.168.1.10', '10.0.0.5'], 
        os: 'Linux', 
        osVersion: '14.0.0',
        arch: 'amd64', 
        distro: 'Ubuntu',
        distroVersion: '22.04 LTS',
        kernelVersion: '6.8.0-41-generic',
        virtSystem: 'KVM',
        virtRole: 'Guest',

  // 2. 渲染资产树
  function renderTree(data, openSysId) {
    const container = document.getElementById('assetTree');
    container.innerHTML = '';
    
    function createNode(item, level) {
      const el = document.createElement('div');
      
      // Node Header
      const nodeHeader = document.createElement('div');
      nodeHeader.className = 'tree-node';
      nodeHeader.dataset.id = item.id;
      nodeHeader.onclick = (e) => handleNodeClick(e, item, nodeHeader);
      
      // Toggle Icon
      const toggle = document.createElement('i');
      toggle.className = 'ri-arrow-right-s-line tree-toggle';
      if (item.children && item.children.length > 0) {
        toggle.onclick = (e) => {
          e.stopPropagation();
          toggleTree(toggle, childrenContainer);
        };
      } else {
        toggle.style.opacity = '0';
      }
      nodeHeader.appendChild(toggle);

      // Type Icon
      const icon = document.createElement('i');
      icon.className = `tree-icon ${item.type}`;
      switch(item.type) {
        case 'sys': icon.classList.add('ri-server-line'); break;
        case 'container': icon.classList.add('ri-layout-grid-line'); break;
        case 'app': icon.classList.add('ri-apps-line'); break;
        case 'model': icon.classList.add('ri-brain-line'); break;
        case 'comp': icon.classList.add('ri-code-box-line'); break;
        case 'group': icon.classList.add('ri-code-box-line'); break;
      }
      nodeHeader.appendChild(icon);

      // Label
      const label = document.createElement('span');
      label.className = 'tree-label';
      label.innerHTML = item.name + (item.isAI ? ' <span class="ai-tag">AI</span>' : '');
      nodeHeader.appendChild(label);

      // Badge
      if (item.type === 'sys') {
         const badge = document.createElement('span');
         badge.style.cssText = 'font-size:12px;color:var(--text-tertiary);margin-left:auto;padding-left:8px;font-family:var(--font-mono);';
         badge.textContent = item.ip;
         nodeHeader.appendChild(badge);
      }

      el.appendChild(nodeHeader);

      // Children Container
      let childrenContainer = null;
      if (item.children && item.children.length > 0) {
        childrenContainer = document.createElement('div');
        childrenContainer.className = 'tree-children';
        if (item.type === 'sys' && openSysId && item.id === openSysId) {
          childrenContainer.classList.add('open');
          toggle.classList.add('open');
        }
        item.children.forEach(child => {
          childrenContainer.appendChild(createNode(child, level + 1));
        });
        el.appendChild(childrenContainer);
      }

      return el;
    }

    data.forEach(item => container.appendChild(createNode(item, 0)));
  }

    toggleEl.classList.toggle('open');
    childrenEl.classList.toggle('open');
  }

  function handleNodeClick(e, item, element) {
    // Update active style
    document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('active'));
    element.classList.add('active');
    
    // Render View
    renderView(item);
  }

  function searchTree(keyword) {
    // Simple filter implementation: hide nodes that don't match
    const k = keyword.toLowerCase();
    const nodes = document.querySelectorAll('.tree-node');
    // Reset all
    nodes.forEach(n => n.parentElement.style.display = 'block');
    
    if (!k) return;

    // This is a simplified search that just hides non-matching root branches or specific nodes
    // For a proper tree search, we'd need to traverse data and re-render or intelligently hide DOM
    // For this demo, let's just re-render filtered data? No, structure is complex.
    // Let's iterate visual nodes.
    nodes.forEach(node => {
      const text = node.innerText.toLowerCase();
      if (!text.includes(k)) {
        // Only hide if it's a leaf or matching logic... 
        // Better: Expand all and highlight? 
        // Let's implement data filtering for the root level to keep it simple and robust as per requirements "Support search by system name/IP"
      }
    });
    
    // Filter root data
    const filtered = assetTreeData.filter(sys => 
      sys.name.toLowerCase().includes(k) || (sys.ip && sys.ip.includes(k))
    );
    renderTree(filtered, filtered[0]?.id);
  }

  // 4. 右侧视图渲染逻辑
  function drillDown(nodeId) {
    const nodeDiv = document.querySelector(`.tree-node[data-id="${nodeId}"]`);
    if (nodeDiv) {
      // Open parents
      let parent = nodeDiv.parentElement.parentElement; 
      while (parent && parent.classList.contains('tree-children')) {
         parent.classList.add('open');
         const parentWrapper = parent.parentElement;
         const parentToggle = parentWrapper.querySelector('.tree-toggle');
         if (parentToggle) parentToggle.classList.add('open');
         parent = parentWrapper.parentElement;
      }
      nodeDiv.click();
      nodeDiv.scrollIntoView({behavior: 'smooth', block: 'center'});
    }
  }

  const ADAPTIVE_VISIBLE_ROWS = 2;
  let adaptiveResizeTimer = null;
  let adaptiveResizeBound = false;

  function toggleAdaptiveFields(nodeId) {
    const card = document.getElementById(`card-${nodeId}`);
    if (!card) return;
    const expanded = card.dataset.expanded === '1';
    card.dataset.expanded = expanded ? '0' : '1';
    applyAdaptiveCard(card);
  }

  function computeGridRowIndexMap(items) {
    const rows = [];
    const map = new Map();
    items.forEach((el) => {
      const top = el.offsetTop;
      let rowIndex = rows.findIndex(rTop => Math.abs(rTop - top) <= 2);
      if (rowIndex === -1) {
        rows.push(top);
        rowIndex = rows.length - 1;
      }
      map.set(el, rowIndex);
    });
    return map;
  }

  function applyAdaptiveCard(card) {
    const nodeId = card.dataset.nodeId;
    const grid = document.getElementById(`grid-${nodeId}`);
    const row = document.getElementById(`afRow-${nodeId}`);
    const btn = document.getElementById(`afBtn-${nodeId}`);
    const icon = document.getElementById(`afIcon-${nodeId}`);
    if (!grid || !row || !btn || !icon) return;

    const onlyExpandEls = Array.from(grid.querySelectorAll('.only-expand'));
    const expanded = card.dataset.expanded === '1';
    const allFields = Array.from(grid.children).filter(el => el.classList && el.classList.contains('sf'));
    const nonOnlyExpandFields = allFields.filter(el => !el.classList.contains('only-expand'));

    nonOnlyExpandFields.forEach(el => { el.style.display = ''; });
    if (expanded) onlyExpandEls.forEach(el => { el.style.display = ''; });
    else onlyExpandEls.forEach(el => { el.style.display = 'none'; });

    const rowIndexMap = computeGridRowIndexMap(nonOnlyExpandFields);
    let maxRowIndex = 0;
    nonOnlyExpandFields.forEach(el => {
      const idx = rowIndexMap.get(el) ?? 0;
      if (idx > maxRowIndex) maxRowIndex = idx;
    });
    const hasRowOverflow = (maxRowIndex + 1) > ADAPTIVE_VISIBLE_ROWS;
    const hasOnlyExpand = onlyExpandEls.length > 0;
    const shouldShowToggle = hasOnlyExpand || hasRowOverflow;

    if (!shouldShowToggle) {
      row.style.display = 'none';
      btn.dataset.open = '0';
      card.dataset.expanded = '0';
      icon.style.transform = 'rotate(0deg)';
      btn.title = '展开';
      return;
    }

    row.style.display = 'flex';

    if (!expanded) {
      nonOnlyExpandFields.forEach(el => {
        const idx = rowIndexMap.get(el) ?? 0;
        el.style.display = idx >= ADAPTIVE_VISIBLE_ROWS ? 'none' : '';
      });
      btn.dataset.open = '0';
      icon.style.transform = 'rotate(0deg)';
      btn.title = '展开';
    } else {
      btn.dataset.open = '1';
      icon.style.transform = 'rotate(180deg)';
      btn.title = '收起';
    }
  }

  function initAdaptiveFields(rootEl) {
    if (!adaptiveResizeBound) {
      adaptiveResizeBound = true;
      window.addEventListener('resize', () => {
        clearTimeout(adaptiveResizeTimer);
        adaptiveResizeTimer = setTimeout(() => {
          const panel = document.getElementById('viewPanel');
          if (!panel) return;
          initAdaptiveFields(panel);
        }, 120);
      });
    }

    const cards = rootEl.querySelectorAll('.system-summary-card[data-adaptive="1"]');
    cards.forEach(card => applyAdaptiveCard(card));
  }

  function copyCode(btn) {
    const text = btn.parentElement.textContent.replace('复制','').trim();
    navigator.clipboard.writeText(text).then(()=>{
      btn.innerHTML = '<i class="ri-check-line"></i> 已复制';
      setTimeout(()=>{ btn.innerHTML = '<i class="ri-file-copy-line"></i> 复制'; }, 1800);
    });

  let licensePopoverAnchor = null;

  function showLicensePopover(evt, licenseStr) {
    if (evt) evt.stopPropagation();
    const anchor = evt?.currentTarget || evt?.target;
    const pop = document.getElementById('licensePopover');
    const body = document.getElementById('licensePopoverBody');
    if (!pop || !body || !anchor) return;

    const raw = String(licenseStr ?? '').trim();
    let licenses = raw && raw !== '-' ? raw.split(',').map(l => l.trim()).filter(Boolean) : [];
    if (licenses.length <= 1) {
      const extra = ['Apache-2.0', 'MIT', 'BSD-2-Clause', 'LGPL-2.1-only', 'MPL-2.0'];
      licenses = [...new Set([...licenses, ...extra])].filter(Boolean);
    }

    body.innerHTML = licenses.length === 0
      ? '<div style="color:var(--text-tertiary);text-align:center;padding:14px 8px;">暂无许可证信息</div>'
      : `
        <div class="license-list">
          ${licenses.map(l => `
            <div class="license-item">
              <span class="license-item-name">${l}</span>
            </div>
          `).join('')}
        </div>
      `;
    
    const countEl = document.getElementById('licensePopoverCount');
    if (countEl) countEl.textContent = `(${licenses.length})`;

    if (pop.classList.contains('show') && licensePopoverAnchor === anchor) {
      closeLicensePopover();
      return;
    }

    licensePopoverAnchor = anchor;
    pop.classList.add('show');

    const ar = anchor.getBoundingClientRect();
    const pr = pop.getBoundingClientRect();
    const margin = 8;
    let left = ar.left;
    let top = ar.bottom + margin;

    if (left + pr.width + margin > window.innerWidth) left = Math.max(margin, window.innerWidth - pr.width - margin);
    if (top + pr.height + margin > window.innerHeight) top = Math.max(margin, ar.top - pr.height - margin);
    if (top < margin) top = margin;

    pop.style.left = `${left}px`;
    pop.style.top = `${top}px`;

    if (!licensePopoverOutsideHandlerBound) {
      document.addEventListener('click', (e) => {
        const p = document.getElementById('licensePopover');
        if (!p || !p.classList.contains('show')) return;
        if (p.contains(e.target)) return;
        if (licensePopoverAnchor && licensePopoverAnchor.contains(e.target)) return;
        closeLicensePopover();
      });
      window.addEventListener('resize', () => closeLicensePopover());
      window.addEventListener('scroll', () => closeLicensePopover(), true);
      licensePopoverOutsideHandlerBound = true;
    }
  }

  function closeLicensePopover() {
    const pop = document.getElementById('licensePopover');
    if (!pop) return;
    pop.classList.remove('show');
    licensePopoverAnchor = null;
  }

  document.addEventListener('keydown', e => { 
    if(e.key === 'Escape') {
